name: AI Dependency Upgrade Agent

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: npm install

      - name: Audit
        run: npm audit --json > audit-report.json || true

      - name: Run Tests
        run: npm test