name: AI Dependency Upgrade Agent

on:
  workflow_dispatch:


jobs:

  analyze-and-upgrade:

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run Audit
        run: npm audit --json > audit-report.json || true

      - name: Run AI Agent
        id: ai-agent
        run: npm run agent
        env:
          OPENROUTER_API_KEY:
            ${{ secrets.OPENROUTER_API_KEY }}

      - name: Create Pull Request
        if: steps.ai-agent.outputs.has_upgrades == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: AI dependency upgrades
          title: "AI Dependency Upgrade"
          body: |
            Automated dependency upgrades generated by AI agent.

            - Security audit analyzed
            - Safe upgrades applied
            - Validation passed
          branch: ai/dependency-upgrades